databases:
  - name: senior-expert-db
    plan: free
    databaseName: senior_expert_platform
    user: senior_expert

services:
  - type: web
    name: senior-expert-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/app.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: senior-expert-db
          property: connectionString
      - key: PLATFORM_FEE_RATE
        value: "0.12"
      - key: INCENTIVE_FEE_RATE
        value: "0.18"
      - key: WITHHOLDING_TAX_RATE
        value: "0.033"
      - key: MIN_DAILY_RATE
        value: "300000"
      - key: TOSS_SECRET_KEY
        value: "test_sk_xxx"
      - key: TOSS_CLIENT_KEY
        value: "test_ck_xxx"
